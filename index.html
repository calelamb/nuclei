    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA support (web only).
      // Use document.baseURI so this works whether the IDE is hosted at /
      // or at /try/ (current getnuclei.dev layout).
      if ('serviceWorker' in navigator && !window.__TAURI_INTERNALS__) {
        navigator.serviceWorker.register(new URL('sw.js', document.baseURI).href).catch(() => {});
      }
    </script>
  </body>
